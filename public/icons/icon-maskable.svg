<?xml version="1.0" encoding="UTF-8"?>
<!--
  Variante maskable pour Android adaptive icons.
  - Le fond couvre bord à bord (Android peut couper jusqu'à 40 px / côté).
  - Le contenu reste DANS LA SAFE ZONE : cercle de rayon 40% (≈ 205 px) centré.
  - Pour ça on resserre la scène E dans une bande centrale verticale 130-380 px.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="PRS Simulator">
  <!-- Fond plein bord à bord -->
  <rect width="512" height="512" fill="#0a0f1e"/>

  <!-- Rails (resserrés horizontalement pour rester dans la safe zone) -->
  <line x1="120" y1="338" x2="392" y2="338"
        stroke="#22d3ee" stroke-width="14" stroke-linecap="round" opacity="0.85"/>
  <line x1="120" y1="358" x2="392" y2="358"
        stroke="#22d3ee" stroke-width="14" stroke-linecap="round" opacity="0.55"/>

  <!-- Traverses -->
  <g stroke="#475569" stroke-width="12" stroke-linecap="round">
    <line x1="148" y1="324" x2="148" y2="372"/>
    <line x1="208" y1="324" x2="208" y2="372"/>
    <line x1="268" y1="324" x2="268" y2="372"/>
    <line x1="328" y1="324" x2="328" y2="372"/>
    <line x1="388" y1="324" x2="388" y2="372"/>
  </g>

  <!-- Pied de mât -->
  <line x1="244" y1="324" x2="304" y2="324"
        stroke="#475569" stroke-width="14" stroke-linecap="round"/>

  <!-- Mât -->
  <line x1="274" y1="324" x2="274" y2="170"
        stroke="#64748b" stroke-width="14" stroke-linecap="round"/>

  <!-- Halo -->
  <circle cx="274" cy="158" r="74" fill="none" stroke="#22c55e" stroke-width="18" opacity="0.18"/>
  <circle cx="274" cy="158" r="54" fill="none" stroke="#22c55e" stroke-width="14" opacity="0.40"/>

  <!-- Tête + lampe + reflet -->
  <circle cx="274" cy="158" r="38" fill="#0f172a" stroke="#16a34a" stroke-width="10"/>
  <circle cx="274" cy="158" r="24" fill="#22c55e"/>
  <circle cx="262" cy="146" r="8"  fill="#bbf7d0" opacity="0.55"/>
</svg>
