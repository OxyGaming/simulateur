<?xml version="1.0" encoding="UTF-8"?>
<!--
  Icône maskable pour Android adaptive icons.
  Le contenu visible doit rester dans la "safe zone" (cercle de rayon 40% centré).
  Ici, on agrandit la zone de fond plein bord à bord et on garde le contenu
  dans le carré central de 60% (256→ contenu dans 154-358).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="PRS Simulator">
  <!-- Fond bord à bord (le découpage Android peut couper jusqu'à 40px de chaque côté) -->
  <rect width="512" height="512" fill="#0a0f1e"/>

  <!-- Tout le contenu dans la zone safe (cercle d'env. 40% du côté) -->
  <!-- Mât -->
  <rect x="248" y="170" width="16" height="170" rx="4" fill="#cbd5e1"/>

  <!-- Tête de signal -->
  <rect x="208" y="180" width="96" height="130" rx="14" fill="#1e293b" stroke="#334155" stroke-width="3"/>

  <!-- Lampes -->
  <circle cx="256" cy="210" r="18" fill="#ef4444"/>
  <circle cx="256" cy="210" r="9"  fill="#fecaca" opacity="0.7"/>

  <circle cx="256" cy="248" r="18" fill="#f59e0b"/>
  <circle cx="256" cy="248" r="9"  fill="#fde68a" opacity="0.5"/>

  <circle cx="256" cy="286" r="18" fill="#22c55e"/>
  <circle cx="256" cy="286" r="9"  fill="#bbf7d0" opacity="0.7"/>

  <!-- Voie -->
  <g stroke="#64748b" stroke-width="4" stroke-linecap="round">
    <line x1="172" y1="346" x2="340" y2="346"/>
    <line x1="172" y1="358" x2="340" y2="358"/>
  </g>
  <g fill="#475569">
    <rect x="186" y="342" width="14" height="22" rx="2"/>
    <rect x="220" y="342" width="14" height="22" rx="2"/>
    <rect x="254" y="342" width="14" height="22" rx="2"/>
    <rect x="288" y="342" width="14" height="22" rx="2"/>
    <rect x="322" y="342" width="14" height="22" rx="2"/>
  </g>

  <!-- PRS -->
  <text x="256" y="166"
        text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Consolas, monospace"
        font-size="28" font-weight="700"
        fill="#22d3ee" letter-spacing="4">PRS</text>
</svg>
